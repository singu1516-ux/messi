<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Góc Nhỏ Tình Yêu Của Chúng Mình ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pastel-pink: #ffd6e0;
            --pastel-pink-dark: #ffb7c5;
            --pastel-cream: #fff9f0;
            --text-color: #5d4037;
            --font-love: 'Pacifico', cursive;
            --font-main: 'Quicksand', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--pastel-cream);
            color: var(--text-color);
            font-family: var(--font-main);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- BACKGROUND HEART SYSTEM --- */
        #heart-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--pastel-cream) 0%, #ffe0e9 100%);
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
        }

        .main-title {
            font-family: var(--font-love);
            font-size: clamp(3rem, 10vw, 6rem);
            color: #ff6f91;
            text-shadow: 2px 2px 0px rgba(255,255,255,0.5);
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        .couple-names {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 40px;
        }

        .couple-names span { color: #ff6f91; font-weight: 700; }

        /* --- THE VIDEO SECTION --- */
        .video-container {
            max-width: 800px;
            width: 90%;
            margin: 50px 0;
            position: relative;
            z-index: 1;
        }

        .video-frame {
            background: #fff;
            padding: 15px;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(255,183,197,0.4);
            border: 3px dashed var(--pastel-pink-dark);
            transform: rotate(-1deg);
            transition: 0.3s;
        }

        .video-frame:hover { transform: rotate(0deg) scale(1.02); }

        video {
            width: 100%;
            height: auto;
            border-radius: 20px;
            display: block;
        }

        /* --- TYPEWRITER & QUOTES --- */
        .quote-wrapper {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            max-width: 700px;
            width: 90%;
            border: 1px solid rgba(255,214,224,0.5);
            margin: 50px 0;
            text-align: center;
            position: relative;
        }
        
        .quote-wrapper::before {
            content: '“';
            font-family: var(--font-love);
            font-size: 8rem;
            color: #ffb7c5;
            position: absolute;
            top: -20px; left: 20px;
            opacity: 0.3;
        }

        #typewriter {
            font-size: 1.5rem;
            font-style: italic;
            color: #8d6e63;
            min-height: 80px;
            line-height: 1.8;
        }

        /* --- THE "AUTOPLAY NOTICE" (Ninja style) --- */
        #start-notice {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 249, 240, 0.95);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.5s;
        }
        
        #start-notice .heart-icon {
            font-size: 8rem;
            color: #ff6f91;
            animation: pulse 1.5s infinite;
        }
        
        #start-notice p {
            font-family: var(--font-love);
            font-size: 2rem;
            color: var(--text-color);
            margin-top: 20px;
        }

        /* --- ANIMATIONS --- */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* --- FOOTER --- */
        footer {
            padding: 50px;
            text-align: center;
            color: #bcaaa4;
            font-size: 0.9rem;
        }

    </style>
</head>
<body>

    <div id="start-notice">
        <div class="heart-icon">❤️</div>
        <p>Gõ cửa trái tim...</p>
    </div>

    <canvas id="heart-canvas"></canvas>

    <div class="hero">
        <h1 class="main-title">Tình Yêu</h1>
        <p class="couple-names">Của <span>[Hoang Nhật Huy]</span> & <span>[Trần Mỹ Linh]</span></p>
        <p style="font-style: italic; opacity: 0.7;">3 Năm Cấp Ba - 1 Đời Thương Nhớ</p>
    </div>

    <div class="video-container">
        <div class="video-frame">
            <video id="love-video" controls loop playsinline>
                <source src="tinh-yeu.mp4" type="video/mp4">
                Trình duyệt của bạn không hỗ trợ xem video này.
            </video>
        </div>
    </div>

    <div class="quote-wrapper">
        <div id="typewriter"></div>
    </div>

    <footer>
        <p>&copy; 2026 Gửi tặng [Tên bạn gái] - Người con gái tuyệt vời nhất.</p>
        <p style="margin-top: 10px;">Created with ❤️ by [Tên của bạn]</p>
    </footer>

    <script>
        // --- HEART SYSTEM (HIỆU ỨNG TRÁI TIM BAY) ---
        const canvas = document.getElementById('heart-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, hearts = [];

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            hearts = [];
            for(let i=0; i<50; i++) hearts.push(new Heart());
        }

        class Heart {
            constructor() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 15 + 5;
                this.vY = Math.random() * 0.8 + 0.2;
                this.vX = Math.random() * 0.5 - 0.25;
                this.opacity = Math.random() * 0.5 + 0.1;
                this.angle = Math.random() * Math.PI * 2;
                this.spin = Math.random() * 0.02 - 0.01;
            }
            update() {
                this.y -= this.vY;
                this.x += this.vX;
                this.angle += this.spin;
                if(this.y < -50) { this.y = height + 50; this.x = Math.random()*width; }
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = '#ffb7c5';
                
                // Vẽ hình trái tim bằng Bezier Curve
                ctx.beginPath();
                ctx.moveTo(0, this.size / 4);
                ctx.bezierCurveTo(0, 0, -this.size / 2, 0, -this.size / 2, this.size / 4);
                ctx.bezierCurveTo(-this.size / 2, this.size / 2, 0, this.size * 3 / 4, 0, this.size);
                ctx.bezierCurveTo(0, this.size * 3 / 4, this.size / 2, this.size / 2, this.size / 2, this.size / 4);
                ctx.bezierCurveTo(this.size / 2, 0, 0, 0, 0, this.size / 4);
                ctx.fill();
                ctx.restore();
            }
        }

        function render() {
            ctx.clearRect(0,0,width,height);
            hearts.forEach(h => { h.update(); h.draw(); });
            requestAnimationFrame(render);
        }

        window.addEventListener('resize', init);
        init(); render();

        // --- TYPEWRITER SYSTEM (LỜI NHẮN TÌNH YÊU) ---
        const quotes = [
            "Gặp em trong những năm tháng đẹp nhất của tuổi trẻ, đó là may mắn của anh.",
            "Giá mà có thể biến thời gian thành kẹo ngọt, để mỗi ngày bên em đều thật tan chảy...",
            "Tạm biệt mái trường, tạm biệt thầy cô, nhưng không bao giờ tạm biệt em!",
            "Em không phải là người đầu tiên anh thích, nhưng là người duy nhất anh muốn bên cạnh.",
            "Cảm ơn vì đã cùng anh viết nên câu chuyện thanh xuân tuyệt vời nhất. Yêu em! ❤️"
        ];
        
        let qIdx = 0, cIdx = 0, isErasing = false;
        const typeEl = document.getElementById('typewriter');

        function typeEffect() {
            if (!typeEl) return;
            const current = quotes[qIdx];
            if(!isErasing) {
                typeEl.innerText = current.substring(0, cIdx++);
                if(cIdx > current.length) { isErasing = true; setTimeout(typeEffect, 3000); }
                else setTimeout(typeEffect, 60);
            } else {
                typeEl.innerText = current.substring(0, cIdx--);
                if(cIdx < 0) { isErasing = false; qIdx = (qIdx+1)%quotes.length; setTimeout(typeEffect, 800); }
                else setTimeout(typeEffect, 40);
            }
        }
        typeEffect();

        // --- NINJA STARTER (KÍCH HOẠT KHI CHẠM) ---
        const startNotice = document.getElementById('start-notice');
        const loveVideo = document.getElementById('love-video');

        function startDream() {
            // Tự động phát video
            loveVideo.play().catch(e => console.log("Video đợi em chạm vào..."));
            
            // Ẩn lớp phủ mờ dần
            startNotice.style.opacity = '0';
            setTimeout(() => {
                startNotice.style.display = 'none';
            }, 500);
        }

        // Chạm vào bất kỳ đâu để bắt đầu giấc mơ tình yêu
        startNotice.addEventListener('click', startDream);
        startNotice.addEventListener('touchstart', startDream);

    </script>
</body>
</html>
