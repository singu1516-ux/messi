<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vũ Trụ Của Chúng Mình ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            --text-main: #ffffff;
            --text-accent: #ff9a9e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            color: var(--text-main);
            overflow-x: hidden;
            background: #0f0c29; /* Fallback */
            /* Animated Aurora Background */
            background: linear-gradient(45deg, #0f0c29, #302b63, #24243e, #ff9a9e, #fecfef);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            perspective: 1000px; /* Bật chế độ 3D cho toàn trang */
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- 3D CANVAS ENGINE --- */
        #particle-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        /* --- WRAPPER 3D TƯƠNG TÁC --- */
        .scene {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 20px;
            transform-style: preserve-3d;
        }

        /* --- GLASSMORPHISM CARDS (THẺ KÍNH 3D) --- */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            box-shadow: var(--glass-shadow);
            padding: 50px;
            text-align: center;
            max-width: 800px;
            width: 100%;
            transition: transform 0.1s ease-out, box-shadow 0.3s;
            transform-style: preserve-3d;
            margin-bottom: 50px;
        }

        .glass-panel:hover {
            box-shadow: 0 15px 50px 0 rgba(255, 154, 158, 0.4);
        }

        /* Yếu tố nổi bật lên khỏi mặt kính (Floating Elements) */
        .floating-text {
            transform: translateZ(50px); /* Đẩy chữ lồi ra không gian 3D */
            font-family: 'Dancing Script', cursive;
            font-size: clamp(3rem, 8vw, 6rem);
            background: -webkit-linear-gradient(#fff, #ff9a9e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 15px rgba(255,154,158,0.5));
            margin-bottom: 10px;
        }

        .subtitle {
            transform: translateZ(30px);
            font-size: 1.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 300;
            opacity: 0.9;
        }

        /* --- VIDEO CONTAINER 3D --- */
        .video-wrapper {
            transform: translateZ(60px); /* Khung video lồi hẳn lên */
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.4);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            margin-top: 40px;
            position: relative;
        }

        video {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }

        /* --- TYPEWRITER KÍNH --- */
        .quote-panel {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border-left: 5px solid #ff9a9e;
            padding: 30px;
            border-radius: 15px;
            transform: translateZ(40px);
            margin-top: 40px;
            font-style: italic;
            font-size: 1.2rem;
            line-height: 1.8;
            min-height: 100px;
        }

        /* --- MÀN HÌNH KHỞI ĐỘNG (NINJA UNLOCKER) --- */
        #intro-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #0f0c29;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: opacity 1s ease, visibility 1s;
        }

        .fingerprint-icon {
            font-size: 4rem;
            animation: pulse-glow 2s infinite;
            color: #ff9a9e;
        }

        @keyframes pulse-glow {
            0% { filter: drop-shadow(0 0 10px rgba(255,154,158,0.2)); transform: scale(1); }
            50% { filter: drop-shadow(0 0 40px rgba(255,154,158,1)); transform: scale(1.1); }
            100% { filter: drop-shadow(0 0 10px rgba(255,154,158,0.2)); transform: scale(1); }
        }

    </style>
</head>
<body>

    <div id="intro-screen">
        <div class="fingerprint-icon">✨</div>
        <p style="margin-top: 20px; font-family: 'Montserrat'; letter-spacing: 2px; color: #fff;">CHẠM ĐỂ MỞ KHÓA KÝ ỨC</p>
    </div>

    <canvas id="particle-canvas"></canvas>

    <div class="scene">
        
        <div class="glass-panel" id="main-card">
            <h1 class="floating-text">Thanh Xuân Có Em</h1>
            <p class="subtitle">[Tên Bạn] & [Tên Bạn Gái]</p>
            
            <div class="video-wrapper">
                <video id="love-video" controls loop playsinline>
                    <source src="tinh-yeu.mp4" type="video/mp4">
                    Trình duyệt không hỗ trợ.
                </video>
            </div>

            <div class="quote-panel" id="typewriter"></div>
        </div>

    </div>

    <script>
        // ==========================================
        // 1. ENGINE HẠT ÁNH SÁNG CÓ ĐỘ SÂU (DEPTH PARTICLES)
        // ==========================================
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            // Tạo 100 hạt với các độ sâu khác nhau (z-index ảo)
            for(let i=0; i<100; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    z: Math.random() * 2 + 0.1, // Độ sâu: càng lớn càng gần
                    radius: Math.random() * 2 + 1,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5
                });
            }
        }

        function animateCanvas() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                // Hạt ở gần (z lớn) di chuyển nhanh hơn hạt ở xa
                p.x += p.vx * p.z;
                p.y -= p.vy * p.z + (0.5 * p.z); // Bay lên từ từ

                if(p.y < -10) p.y = height + 10;
                if(p.x < -10) p.x = width + 10;
                if(p.x > width + 10) p.x = -10;

                // Hạt ở gần thì to và sáng hơn, hạt ở xa thì mờ (Blur effect)
                const opacity = Math.min(p.z * 0.3, 0.8);
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius * p.z, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                ctx.fill();
            });
            requestAnimationFrame(animateCanvas);
        }
        window.addEventListener('resize', initCanvas);
        initCanvas(); animateCanvas();

        // ==========================================
        // 2. HIỆU ỨNG NGHIÊNG 3D THEO CHUỘT (MOUSE PARALLAX)
        // ==========================================
        const card = document.getElementById('main-card');
        const scene = document.querySelector('.scene');

        // Áp dụng cho máy tính (dùng chuột)
        scene.addEventListener('mousemove', (e) => {
            let xAxis = (window.innerWidth / 2 - e.pageX) / 40; // Chia số to để nghiêng nhẹ nhàng tinh tế
            let yAxis = (window.innerHeight / 2 - e.pageY) / 40;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // Hồi phục lại vị trí cũ khi chuột đi ra ngoài
        scene.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
            card.style.transition = 'transform 0.5s ease';
        });

        scene.addEventListener('mouseenter', () => {
            card.style.transition = 'none'; // Tắt transition để chuột kéo mượt
        });

        // ==========================================
        // 3. TYPEWRITER (GÕ CHỮ TỰ ĐỘNG)
        // ==========================================
        const quotes = [
            "Anh không giỏi văn, cũng chẳng biết làm thơ. Anh chỉ dùng vài dòng code để nói rằng: Anh yêu em.",
            "Thế giới 3D này có thể lập trình được, nhưng tình cảm anh dành cho em là vô hạn và không có thuật toán nào tính nổi.",
            "Cảm ơn em - Bức tranh tuyệt đẹp nhất trong thanh xuân của anh!"
        ];
        let qIdx = 0, cIdx = 0, isErasing = false;
        const typeEl = document.getElementById('typewriter');

        function typeEffect() {
            const current = quotes[qIdx];
            if(!isErasing) {
                typeEl.innerHTML = current.substring(0, cIdx++) + "<span style='border-right: 2px solid #ff9a9e; padding-right: 2px; animation: blink 0.7s infinite;'></span>";
                if(cIdx > current.length) { isErasing = true; setTimeout(typeEffect, 4000); }
                else setTimeout(typeEffect, 50);
            } else {
                typeEl.innerHTML = current.substring(0, cIdx--) + "<span style='border-right: 2px solid #ff9a9e; padding-right: 2px;'></span>";
                if(cIdx < 0) { isErasing = false; qIdx = (qIdx+1)%quotes.length; setTimeout(typeEffect, 500); }
                else setTimeout(typeEffect, 20);
            }
        }
        typeEffect();

        // ==========================================
        // 4. HỆ THỐNG MỞ KHÓA KÝ ỨC (NINJA PLAY VIDEO)
        // ==========================================
        const introScreen = document.getElementById('intro-screen');
        const video = document.getElementById('love-video');

        introScreen.addEventListener('click', () => {
            // Phát video ngay lập tức
            video.play().catch(err => console.log("Video đợi tương tác thêm..."));
            
            // Làm mờ và tắt màn hình chờ
            introScreen.style.opacity = '0';
            setTimeout(() => {
                introScreen.style.visibility = 'hidden';
            }, 1000);
        });

    </script>
</body>
</html>
